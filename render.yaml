databases:
  - name: marketplace-db
    plan: free
    databaseName: marketplace
    user: marketplace_user

services:
  - type: web
    name: marketplace-backend
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
